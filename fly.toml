app = "whats-next"
primary_region = "bom"
console_command = "/code/manage.py shell"

[deploy]
  release_command = "python manage.py migrate --noinput"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[statics]]
  guest_path = "/code/static"
  url_prefix = "/static/"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"