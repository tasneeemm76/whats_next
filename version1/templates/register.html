{% extends 'base.html' %}
{% load static %}

{% block title %}Sign Up | What's Next{% endblock %}

{% block extra_css %}
  <link rel="stylesheet" href="{% static 'css/forms.css' %}">
{% endblock %}

{% block content %}
  <div class="wn-card-solid reveal" style="max-width: 480px; margin: 0 auto;">
    <h2 class="wn-h2" style="margin: 0 0 var(--space-4); text-align: center;">Sign Up</h2>

    {% if messages %}
      <div style="margin-bottom: var(--space-4);">
        {% for message in messages %}
          <div class="wn-alert wn-alert--{{ message.tags|default:'info' }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="POST" action="{% url 'register_workshop' %}">
      {% csrf_token %}
      <label class="form-label" for="name">Full Name</label>
      <input type="text" name="name" id="name" class="form-input" required>

      <label class="form-label" for="email">Email Address</label>
      <input type="email" name="email" id="email" class="form-input" required>

      <label class="form-label" for="phone">Phone Number</label>
      <input type="text" name="phone" id="phone" class="form-input">

      <label class="form-label">Role</label>
      <select name="role" class="form-select">
        <option value="user">User</option>
        <option value="organizer">Organizer</option>
      </select>

      <label class="form-label" for="password">Password</label>
      <input type="password" name="password" id="password" class="form-input" required>

      <label class="form-label" for="confirm_password">Confirm Password</label>
      <input type="password" name="confirm_password" id="confirm_password" class="form-input" required>

      <button type="submit" class="wn-btn wn-btn--primary wn-interact" style="width: 100%; margin-top: var(--space-4); padding: var(--space-3);">Register</button>
    </form>
  </div>
{% endblock %}
